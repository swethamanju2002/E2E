{% extends 'base.html' %}
{% block content %}

<div style="min-height:60vh;display:flex;align-items:center;justify-content:center;padding:60px 20px">
  <div style="background:rgba(13,27,42,0.8);border:1px solid rgba(16,185,129,0.2);border-radius:24px;padding:60px 48px;text-align:center;max-width:560px;animation:fadeUp 0.8s ease" class="reveal">

    <div style="width:72px;height:72px;background:linear-gradient(135deg,var(--brand-green),#059669);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 24px;box-shadow:0 8px 30px rgba(16,185,129,0.4)">✓</div>

    <h2 style="font-family:var(--font-display);font-weight:800;font-size:2rem;margin-bottom:12px">Application Submitted!</h2>

    <p style="color:var(--text-muted);line-height:1.7;font-size:15px;margin-bottom:8px">
      Thank you for your interest. We've received your application.
    </p>
    <p style="color:var(--text-muted);line-height:1.7;font-size:15px;margin-bottom:32px">
      Our HR team will review your profile and reach out soon.
    </p>

    <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:12px">
      <a href="{% url 'careers' %}" class="btn btn-outline-light px-4">View More Openings</a>
      <a href="{% url 'home' %}" class="btn btn-success px-4">Back to Home</a>
    </div>
  </div>
</div>

{% endblock %}
